<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Fanpage - Portal Porto de Galinhas</title>

    <link rel="stylesheet" href="../css/fanpage.css">

</head>

<body>

    <!-- Banner -->

    <section class="banner">

        <img id="bannerImagem"
            src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
            alt="Banner">

        <div class="perfil">
            <img id="logoImagem"
                src="https://via.placeholder.com/180"
                alt="Logo">
        </div>

    </section>

    <!-- Cabeçalho -->

    <section class="cabecalho">

        <h1 id="nomeEmpresa">
            Carregando...
        </h1>

        <p id="categoriaCidade">
            Carregando informações...
        </p>

        <nav class="menu">

            <a href="#informacoes">Visão Geral</a>
            <a href="#galeria">Fotos</a>
            <a href="#avaliacoes">Avaliações</a>
            <a href="#contato">Contato</a>

        </nav>

    </section>

    <!-- Conteúdo -->

    <main class="container">

        <!-- Lado esquerdo -->

        <aside class="sidebar">

            <div class="card" id="informacoes">

                <h3>Informações</h3>

                <p id="cidade">
                    📍 Porto de Galinhas
                </p>

                <p id="telefone">
                    📞
                </p>

                <p id="site">
                    🌐
                </p>

                <div id="whatsapp"></div>

            </div>

            <div class="card">

                <h3>Mapa</h3>

                <div id="mapa">
                    Aqui aparecerá o mapa do comerciante.
                </div>

            </div>

        </aside>

        <!-- Feed -->

        <section class="feed" id="feed">

            <div class="post">

                <div class="post-header">

                    Bem-vindo!

                </div>

                <img src="https://images.unsplash.com/photo-1540541338287-41700207dee6"
                    alt="Imagem">

                <div class="post-footer">

                    Em breve os anúncios do comerciante aparecerão aqui.

                </div>

            </div>

        </section>

    </main>

    <!-- Galeria -->

    <section id="galeria" class="galeria">

        <!-- Fotos serão carregadas pelo JavaScript -->

    </section>

    <!-- Avaliações -->

    <section id="avaliacoes" class="avaliacoes">

        <h2>Avaliações</h2>

        <div id="listaAvaliacoes">

            Ainda não existem avaliações.

        </div>

    </section>

    <!-- Contato -->

    <section id="contato">

    </section>

    <!-- Scripts -->

    <script src="../js/config.js"></script>

    <script src="../js/fanpage.js"></script>

</body>

</html>
