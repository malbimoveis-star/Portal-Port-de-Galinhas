<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Fanpage - Portal Porto de Galinhas</title>

<link rel="stylesheet" href="../css/fanpage.css">

</head>

<body>

<!-- Banner -->
<section class="banner">

    <img id="fotoCapa"
         src="https://placehold.co/1400x420?text=Capa"
         alt="Capa">

</section>

<!-- Perfil -->
<section class="perfil-area">

    <img id="fotoPerfil"
         class="foto-perfil"
         src="https://placehold.co/180x180?text=Logo"
         alt="Logo">

    <div class="perfil-info">

        <h1 id="nomeEmpresa">Carregando...</h1>

        <p id="categoriaEmpresa"></p>

        <p id="descricaoEmpresa"></p>

    </div>

</section>

<!-- Menu -->
<nav class="menu-fanpage">

    <a href="#">Visão Geral</a>
    <a href="#">Fotos</a>
    <a href="#">Avaliações</a>
    <a href="#">Eventos</a>
    <a href="#">Contato</a>

</nav>

<div class="container">

    <!-- Lado esquerdo -->
    <aside class="sidebar">

        <div class="card">

            <h2>Informações</h2>

            <p id="telefoneEmpresa"></p>

            <p id="enderecoEmpresa"></p>

            <div class="botoes">

                <a id="btnWhatsapp"
                   class="botao whatsapp"
                   target="_blank">
                    WhatsApp
                </a>

                <a id="btnLigar"
                   class="botao ligar">
                    Ligar
                </a>

            </div>

        </div>

        <div class="card">

            <h2>Mapa</h2>

            <div id="mapaComerciante"></div>

        </div>

    </aside>

    <!-- Feed -->
    <main class="feed">

        <div id="listaPosts">

            <div class="post">

                Carregando publicações...

            </div>

        </div>

    </main>

</div>

<script src="../js/config.js"></script>
<script src="../js/fanpage.js"></script>

</body>
</html>
