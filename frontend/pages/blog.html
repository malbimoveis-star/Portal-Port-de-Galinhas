<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Blog — Portal Porto de Galinhas</title>

  <style>

    * {
      box-sizing: border-box;
      font-family:
        Arial,
        Helvetica,
        sans-serif;
    }

    body {
      margin: 0;
      background: #f2f5f8;
      color: #1c2b36;
    }

    main {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 16px 60px;
    }

    h1 {
      color: #0a5c8a;
      margin-top: 0;
    }

    .grid {
      display: grid;

      grid-template-columns:
        repeat(
          auto-fill,
          minmax(260px, 1fr)
        );

      gap: 20px;

      margin-top: 20px;
    }

    .card {
      background: #fff;

      border-radius: 10px;

      overflow: hidden;

      box-shadow:
        0 2px 8px
        rgba(
          0,
          0,
          0,
          0.08
        );

      text-decoration: none;

      color: inherit;

      display: block;

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
    }

    .card:hover {
      transform:
        translateY(-3px);

      box-shadow:
        0 6px 18px
        rgba(
          0,
          0,
          0,
          0.12
        );
    }

    .card-imagem {
      width: 100%;

      height: 190px;

      object-fit: cover;

      display: block;

      background:
        #dde5ea;
    }

    .card-sem-imagem {
      width: 100%;

      height: 190px;

      display: flex;

      align-items: center;

      justify-content: center;

      background:
        linear-gradient(
          135deg,
          #0a5c8a,
          #1385bd
        );

      color: #fff;

      font-size: 18px;

      font-weight: bold;

      text-align: center;

      padding: 20px;
    }

    .card .conteudo {
      padding: 16px;
    }

    .card h2 {
      font-size: 1.05em;

      margin:
        0 0 8px;

      color:
        #0a5c8a;
    }

    .card p {
      font-size:
        0.9em;

      color:
        #55707f;

      margin: 0;

      line-height:
        1.5;
    }

    .vazio {
      color:
        #55707f;

      margin-top:
        30px;
    }

    .erro {
      color:
        #b42318;

      background:
        #fdecec;

      padding:
        15px;

      border-radius:
        8px;

      margin-top:
        20px;
    }

  </style>

</head>


<body>


  <!-- =====================================================
       HEADER DO SITE
       ===================================================== -->

  <div id="layout-header"></div>


  <!-- =====================================================
       CONTEÚDO DO BLOG
       ===================================================== -->

  <main>

    <h1 data-i18n="blog.titulo">
      Blog
    </h1>


    <div
      id="lista"
      class="grid"
    ></div>


    <p
      id="vazio"
      class="vazio"
      data-i18n="blog.vazio"
      style="display:none"
    >
      Ainda não temos artigos publicados.
    </p>


  </main>


  <!-- =====================================================
       RODAPÉ DO SITE
       ===================================================== -->

  <div id="layout-rodape"></div>


  <!-- =====================================================
       SCRIPTS DO SISTEMA
       ===================================================== -->

  <script src="../js/i18n.js"></script>

  <script src="../js/layout.js"></script>


  <!-- =====================================================
       SCRIPT DO BLOG
       ===================================================== -->

  <script>

    'use strict';


    // =====================================================
    // ESCAPAR HTML
    // =====================================================

    function escapeHtml(valor) {

      if (
        valor === null ||
        valor === undefined
      ) {

        return '';

      }

      return String(valor)

        .replace(
          /&/g,
          '&amp;'
        )

        .replace(
          /</g,
          '&lt;'
        )

        .replace(
          />/g,
          '&gt;'
        )

        .replace(
          /"/g,
          '&quot;'
        )

        .replace(
          /'/g,
          '&#039;'
        );

    }


    // =====================================================
    // CARREGAR BLOG
    // =====================================================

    async function carregarBlog() {

      const lista =
        document.getElementById(
          'lista'
        );

      const vazio =
        document.getElementById(
          'vazio'
        );


      if (!lista || !vazio) {

        console.error(
          '[BLOG] Elementos do Blog não encontrados.'
        );

        return;

      }


      try {


        // -------------------------------------------------
        // BUSCAR ARTIGOS
        // -------------------------------------------------

        const resposta =
          await fetch(
            '/api/blog'
          );


        if (
          !resposta.ok
        ) {

          throw new Error(
            'Erro ao carregar artigos.'
          );

        }


        const artigos =
          await resposta.json();


        console.log(
          '[BLOG] Artigos recebidos:',
          artigos
        );


        // -------------------------------------------------
        // NENHUM ARTIGO
        // -------------------------------------------------

        if (
          !Array.isArray(artigos) ||
          artigos.length === 0
        ) {

          lista.innerHTML = '';

          vazio.style.display =
            'block';

          return;

        }


        // -------------------------------------------------
        // ESCONDER AVISO DE VAZIO
        // -------------------------------------------------

        vazio.style.display =
          'none';


        // -------------------------------------------------
        // MONTAR CARDS
        // -------------------------------------------------

        lista.innerHTML =

          artigos

            .map(

              function (artigo) {


                // -----------------------------------------
                // TÍTULO
                // -----------------------------------------

                const titulo =
                  escapeHtml(
                    artigo.titulo ||
                    'Sem título'
                  );


                // -----------------------------------------
                // RESUMO
                // -----------------------------------------

                const resumo =
                  escapeHtml(
                    artigo.resumo ||
                    ''
                  );


                // -----------------------------------------
                // CAPA
                // -----------------------------------------

                const capa =
                  artigo.capa_url
                    ? String(
                        artigo.capa_url
                      )
                    : '';


                // -----------------------------------------
                // ID
                // -----------------------------------------

                const id =
                  encodeURIComponent(
                    artigo.id
                  );


                // -----------------------------------------
                // IMAGEM
                // -----------------------------------------

                let imagemHtml =
                  '';


                if (
                  capa
                ) {


                  imagemHtml = `

                    <img
                      class="card-imagem"

                      src="${escapeHtml(capa)}"

                      alt="${titulo}"

                      loading="lazy"

                      onerror="
                        this.style.display='none';
                        this.nextElementSibling.style.display='flex';
                      "
                    >

                    <div
                      class="card-sem-imagem"

                      style="display:none"
                    >

                      ${titulo}

                    </div>

                  `;


                } else {


                  imagemHtml = `

                    <div
                      class="card-sem-imagem"
                    >

                      ${titulo}

                    </div>

                  `;

                }


                // -----------------------------------------
                // RETORNAR CARD
                // -----------------------------------------

                return `

                  <a
                    class="card"

                    href="/artigo?id=${id}"
                  >

                    ${imagemHtml}


                    <div
                      class="conteudo"
                    >

                      <h2>

                        ${titulo}

                      </h2>


                      ${
                        resumo

                          ? `

                            <p>

                              ${resumo}

                            </p>

                          `

                          : ''

                      }

                    </div>

                  </a>

                `;

              }

            )

            .join('');


      } catch (erro) {


        console.error(
          '[BLOG] Erro:',
          erro
        );


        lista.innerHTML =
          '';


        vazio.textContent =
          window.i18nPortal

            ? window.i18nPortal.t(
                'blog.erro'
              )

            : 'Não foi possível carregar os artigos agora.';


        vazio.classList.add(
          'erro'
        );


        vazio.style.display =
          'block';

      }

    }


    // =====================================================
    // INICIALIZAÇÃO
    // =====================================================

    document.addEventListener(
      'DOMContentLoaded',
      function () {

        carregarBlog();

      }
    );

  </script>


</body>

</html>
