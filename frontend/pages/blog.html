<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Blog — Portal Porto de Galinhas
  </title>

  <style>

    * {
      box-sizing: border-box;
      font-family:
        Arial,
        Helvetica,
        sans-serif;
    }

    body {
      margin: 0;
      background: #f2f5f8;
      color: #1c2b36;
    }

    header {
      background: #0a5c8a;
      padding: 18px 24px;
    }

    header a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1em;
    }

    main {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 16px;
    }

    h1 {
      color: #0a5c8a;
    }

    .grid {
      display: grid;
      grid-template-columns:
        repeat(
          auto-fill,
          minmax(260px, 1fr)
        );

      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #fff;

      border-radius: 10px;

      overflow: hidden;

      box-shadow:
        0 2px 8px
        rgba(
          0,
          0,
          0,
          0.08
        );

      text-decoration: none;

      color: inherit;

      display: block;

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
    }

    .card:hover {
      transform:
        translateY(-3px);

      box-shadow:
        0 6px 18px
        rgba(
          0,
          0,
          0,
          0.12
        );
    }

    .card-imagem {
      width: 100%;

      height: 190px;

      object-fit: cover;

      display: block;

      background:
        #dde5ea;
    }

    .card-sem-imagem {
      width: 100%;

      height: 190px;

      display: flex;

      align-items: center;

      justify-content: center;

      background:
        linear-gradient(
          135deg,
          #0a5c8a,
          #1385bd
        );

      color: #fff;

      font-size: 18px;

      font-weight: bold;

      text-align: center;

      padding: 20px;
    }

    .card .conteudo {
      padding: 16px;
    }

    .card h2 {
      font-size: 1.05em;

      margin:
        0 0 8px;

      color:
        #0a5c8a;
    }

    .card p {
      font-size:
        0.9em;

      color:
        #55707f;

      margin: 0;

      line-height:
        1.5;
    }

    .vazio {
      color:
        #55707f;

      margin-top:
        30px;
    }

  </style>

</head>


<body>


  <header>

    <a href="/">
      ← Portal Porto de Galinhas
    </a>

  </header>



  <main>


    <h1>
      Blog
    </h1>


    <div
      id="lista"
      class="grid"
    ></div>


    <p
      id="vazio"
      class="vazio"
      style="display:none"
    >
      Ainda não temos artigos publicados.
    </p>


  </main>



  <script>

    'use strict';


    // =====================================================
    // ESCAPAR HTML
    // =====================================================

    function escapeHtml(valor) {

      if (
        valor === null ||
        valor === undefined
      ) {

        return '';

      }

      return String(valor)

        .replace(
          /&/g,
          '&amp;'
        )

        .replace(
          /</g,
          '&lt;'
        )

        .replace(
          />/g,
          '&gt;'
        )

        .replace(
          /"/g,
          '&quot;'
        )

        .replace(
          /'/g,
          '&#039;'
        );

    }



    // =====================================================
    // CARREGAR BLOG
    // =====================================================

    async function carregarBlog() {

      const lista =
        document.getElementById(
          'lista'
        );

      const vazio =
        document.getElementById(
          'vazio'
        );


      try {


        const resposta =
          await fetch(
            '/api/blog'
          );


        if (
          !resposta.ok
        ) {

          throw new Error(
            'Erro ao carregar artigos.'
          );

        }


        const artigos =
          await resposta.json();


        console.log(
          '[BLOG] Artigos recebidos:',
          artigos
        );


        if (
          !Array.isArray(artigos) ||
          artigos.length === 0
        ) {

          vazio.style.display =
            'block';

          return;

        }


        lista.innerHTML =
          artigos
            .map(
              function (artigo) {


                const titulo =
                  escapeHtml(
                    artigo.titulo ||
                    'Sem título'
                  );


                const resumo =
                  escapeHtml(
                    artigo.resumo ||
                    ''
                  );


                const capa =
                  artigo.capa_url
                    ? String(
                        artigo.capa_url
                      )
                    : '';


                const id =
                  encodeURIComponent(
                    artigo.id
                  );


                let imagemHtml =
                  '';


                if (
                  capa
                ) {

                  imagemHtml = `

                    <img
                      class="card-imagem"
                      src="${escapeHtml(capa)}"
                      alt="${titulo}"
                      loading="lazy"
                      onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                    >

                    <div
                      class="card-sem-imagem"
                      style="display:none"
                    >
                      ${titulo}
                    </div>

                  `;

                } else {

                  imagemHtml = `

                    <div
                      class="card-sem-imagem"
                    >
                      ${titulo}
                    </div>

                  `;

                }


                return `

                  <a
                    class="card"
                    href="/artigo?id=${id}"
                  >

                    ${imagemHtml}


                    <div
                      class="conteudo"
                    >

                      <h2>
                        ${titulo}
                      </h2>


                      ${
                        resumo
                          ? `
                            <p>
                              ${resumo}
                            </p>
                          `
                          : ''
                      }

                    </div>

                  </a>

                `;

              }
            )
            .join('');


      } catch (erro) {


        console.error(
          '[BLOG] Erro:',
          erro
        );


        vazio.textContent =
          'Não foi possível carregar os artigos agora.';


        vazio.style.display =
          'block';

      }

    }



    // =====================================================
    // INICIAR
    // =====================================================

    carregarBlog();

  </script>


</body>

</html>
