<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Blog — Portal Porto de Galinhas
  </title>


  <style>

    * {
      box-sizing: border-box;
      font-family:
        Arial,
        Helvetica,
        sans-serif;
    }


    body {
      margin: 0;

      background:
        #f2f5f8;

      color:
        #1c2b36;
    }


    /* =====================================================
       CONTEÚDO PRINCIPAL
    ===================================================== */

    main {
      max-width:
        1100px;

      margin:
        30px auto;

      padding:
        0 16px 60px;
    }


    .blog-titulo {
      color:
        #0a5c8a;

      margin:
        0 0 10px;
    }


    .blog-descricao {
      color:
        #55707f;

      margin:
        0 0 25px;
    }


    /* =====================================================
       GRID
    ===================================================== */

    .grid {

      display:
        grid;

      grid-template-columns:
        repeat(
          auto-fill,
          minmax(
            260px,
            1fr
          )
        );

      gap:
        20px;

      margin-top:
        20px;
    }


    /* =====================================================
       CARD DO ARTIGO
    ===================================================== */

    .card {

      background:
        #fff;

      border-radius:
        10px;

      overflow:
        hidden;

      box-shadow:
        0 2px 8px
        rgba(
          0,
          0,
          0,
          0.08
        );

      text-decoration:
        none;

      color:
        inherit;

      display:
        block;

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
    }


    .card:hover {

      transform:
        translateY(-3px);

      box-shadow:
        0 6px 18px
        rgba(
          0,
          0,
          0,
          0.12
        );
    }


    /* =====================================================
       IMAGEM DO ARTIGO
    ===================================================== */

    .card-imagem {

      width:
        100%;

      height:
        190px;

      object-fit:
        cover;

      display:
        block;

      background:
        #dde5ea;
    }


    /* =====================================================
       QUANDO NÃO EXISTE IMAGEM
    ===================================================== */

    .card-sem-imagem {

      width:
        100%;

      height:
        190px;

      display:
        flex;

      align-items:
        center;

      justify-content:
        center;

      background:
        linear-gradient(
          135deg,
          #0a5c8a,
          #1385bd
        );

      color:
        #fff;

      font-size:
        18px;

      font-weight:
        bold;

      text-align:
        center;

      padding:
        20px;
    }


    /* =====================================================
       CONTEÚDO DO CARD
    ===================================================== */

    .card .conteudo {

      padding:
        16px;
    }


    .card h2 {

      font-size:
        1.05em;

      margin:
        0 0 8px;

      color:
        #0a5c8a;
    }


    .card p {

      font-size:
        0.9em;

      color:
        #55707f;

      margin:
        0;

      line-height:
        1.5;
    }


    /* =====================================================
       MENSAGENS
    ===================================================== */

    .vazio {

      color:
        #55707f;

      margin-top:
        30px;

      text-align:
        center;
    }


    .carregando {

      color:
        #55707f;

      text-align:
        center;

      padding:
        40px 20px;
    }


  </style>

</head>


<body>


  <!-- =====================================================
       HEADER DO SITE
       O layout.js vai inserir o cabeçalho aqui
  ====================================================== -->

  <div
    id="layout-header"
  ></div>



  <!-- =====================================================
       CONTEÚDO DO BLOG
  ====================================================== -->

  <main>


    <h1
      class="blog-titulo"
      data-i18n="blog.titulo"
    >
      Blog
    </h1>


    <p
      class="blog-descricao"
      data-i18n="blog.descricao"
    >
      Notícias, dicas e informações sobre Porto de Galinhas.
    </p>


    <div
      id="lista"
      class="grid"
    ></div>


    <p
      id="carregando"
      class="carregando"
      data-i18n="blog.carregando"
    >
      Carregando artigos...
    </p>


    <p
      id="vazio"
      class="vazio"
      style="display:none"
      data-i18n="blog.vazio"
    >
      Ainda não temos artigos publicados.
    </p>


  </main>



  <!-- =====================================================
       RODAPÉ DO SITE
       O layout.js vai inserir o rodapé aqui
  ====================================================== -->

  <div
    id="layout-rodape"
  ></div>



  <!-- =====================================================
       SISTEMA DE IDIOMAS
  ====================================================== -->

  <script
    src="../js/i18n.js"
  ></script>


  <!-- =====================================================
       HEADER / RODAPÉ / SELETOR DE IDIOMA
  ====================================================== -->

  <script
    src="../js/layout.js"
  ></script>



  <!-- =====================================================
       JAVASCRIPT DO BLOG
  ====================================================== -->

  <script>

    'use strict';


    // =====================================================
    // ESCAPAR HTML
    // =====================================================

    function escapeHtml(valor) {

      if (
        valor === null ||
        valor === undefined
      ) {

        return '';

      }


      return String(valor)

        .replace(
          /&/g,
          '&amp;'
        )

        .replace(
          /</g,
          '&lt;'
        )

        .replace(
          />/g,
          '&gt;'
        )

        .replace(
          /"/g,
          '&quot;'
        )

        .replace(
          /'/g,
          '&#039;'
        );

    }



    // =====================================================
    // TRADUÇÕES
    // =====================================================

    function traduzir(chave) {

      if (
        window.i18nPortal &&
        typeof window.i18nPortal.t === 'function'
      ) {

        return window.i18nPortal.t(
          chave
        );

      }


      return chave;

    }



    // =====================================================
    // CARREGAR BLOG
    // =====================================================

    async function carregarBlog() {


      const lista =
        document.getElementById(
          'lista'
        );


      const vazio =
        document.getElementById(
          'vazio'
        );


      const carregando =
        document.getElementById(
          'carregando'
        );



      try {


        const resposta =
          await fetch(
            '/api/blog'
          );


        if (
          !resposta.ok
        ) {

          throw new Error(
            'Erro ao carregar artigos.'
          );

        }



        const artigos =
          await resposta.json();



        console.log(
          '[BLOG] Artigos recebidos:',
          artigos
        );



        // -------------------------------------------------
        // ESCONDER CARREGANDO
        // -------------------------------------------------

        if (carregando) {

          carregando.style.display =
            'none';

        }



        // -------------------------------------------------
        // NENHUM ARTIGO
        // -------------------------------------------------

        if (
          !Array.isArray(artigos) ||
          artigos.length === 0
        ) {

          if (vazio) {

            vazio.textContent =
              traduzir(
                'blog.vazio'
              );

            vazio.style.display =
              'block';

          }

          return;

        }



        // -------------------------------------------------
        // MOSTRAR ARTIGOS
        // -------------------------------------------------

        lista.innerHTML =

          artigos

            .map(
              function (artigo) {


                const titulo =
                  escapeHtml(
                    artigo.titulo ||
                    traduzir(
                      'blog.sem_titulo'
                    )
                  );



                const resumo =
                  escapeHtml(
                    artigo.resumo ||
                    ''
                  );



                const capa =
                  artigo.capa_url
                    ? String(
                        artigo.capa_url
                      )
                    : '';



                const id =
                  encodeURIComponent(
                    artigo.id
                  );



                let imagemHtml =
                  '';



                // -----------------------------------------
                // ARTIGO COM CAPA
                // -----------------------------------------

                if (
                  capa
                ) {


                  imagemHtml = `

                    <img

                      class="card-imagem"

                      src="${escapeHtml(capa)}"

                      alt="${titulo}"

                      loading="lazy"

                      onerror="
                        this.style.display='none';
                        this.nextElementSibling.style.display='flex';
                      "

                    >


                    <div

                      class="card-sem-imagem"

                      style="display:none"

                    >

                      ${titulo}

                    </div>

                  `;


                }


                // -----------------------------------------
                // ARTIGO SEM CAPA
                // -----------------------------------------

                else {


                  imagemHtml = `

                    <div

                      class="card-sem-imagem"

                    >

                      ${titulo}

                    </div>

                  `;

                }



                // -----------------------------------------
                // CARD
                // -----------------------------------------

                return `

                  <a

                    class="card"

                    href="/artigo?id=${id}"

                  >


                    ${imagemHtml}



                    <div

                      class="conteudo"

                    >


                      <h2>

                        ${titulo}

                      </h2>



                      ${
                        resumo

                          ? `

                            <p>

                              ${resumo}

                            </p>

                          `

                          : ''

                      }


                    </div>


                  </a>

                `;

              }

            )

            .join('');



      }


      catch (erro) {


        console.error(

          '[BLOG] Erro:',

          erro

        );



        if (carregando) {

          carregando.style.display =
            'none';

        }



        if (vazio) {

          vazio.textContent =

            traduzir(
              'blog.erro'
            );


          vazio.style.display =
            'block';

        }

      }

    }



    // =====================================================
    // ATUALIZAR TEXTOS QUANDO O IDIOMA MUDAR
    // =====================================================

    document.addEventListener(

      'i18n:aplicado',

      function () {


        const vazio =
          document.getElementById(
            'vazio'
          );


        const carregando =
          document.getElementById(
            'carregando'
          );



        if (
          vazio &&
          vazio.style.display !== 'none'
        ) {

          vazio.textContent =

            traduzir(
              'blog.vazio'
            );

        }



        if (
          carregando &&
          carregando.style.display !== 'none'
        ) {

          carregando.textContent =

            traduzir(
              'blog.carregando'
            );

        }

      }

    );



    // =====================================================
    // INICIAR BLOG
    // =====================================================

    carregarBlog();


  </script>


</body>

</html>
