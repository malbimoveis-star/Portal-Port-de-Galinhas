<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blog — Portal Porto de Galinhas</title>

<link rel="stylesheet" href="/css/styles.css">

<style>

.blog-principal {
  max-width:1100px;
  margin:0 auto;
  padding:40px 20px 80px;
}

.blog-titulo {
  color:var(--azul-primario,#0a5c8a);
  margin-bottom:10px;
  font-size:2rem;
}

.blog-subtitulo {
  color:#55707f;
  margin-bottom:30px;
}

.blog-grid {
  display:grid;
  grid-template-columns:
  repeat(auto-fill,minmax(260px,1fr));
  gap:24px;
}

.blog-card {

  display:block;

  background:#fff;

  border-radius:12px;

  overflow:hidden;

  text-decoration:none;

  color:inherit;

  box-shadow:
  0 2px 10px rgba(0,0,0,.08);

  transition:.2s;

}

.blog-card:hover {

  transform:translateY(-4px);

}


.blog-card-imagem {

  width:100%;

  height:190px;

  object-fit:cover;

  display:block;

}


.blog-card-sem-imagem {

  width:100%;

  height:190px;

  display:flex;

  align-items:center;

  justify-content:center;

  text-align:center;

  padding:20px;

  color:white;

  font-weight:bold;

  background:
  linear-gradient(
    135deg,
    #0a5c8a,
    #1385bd
  );

}


.blog-card-conteudo {

  padding:18px;

}


.blog-card-titulo {

  margin:0 0 10px;

  color:
  var(--azul-primario,#0a5c8a);

  font-size:1.1rem;

}


.blog-card-resumo {

  margin:0;

  color:#55707f;

  line-height:1.5;

}


.blog-mensagem {

  color:#55707f;

  text-align:center;

  padding:30px;

}


.blog-erro {

  color:#b42318;

  text-align:center;

  padding:30px;

}


</style>

</head>


<body>


<div id="layout-header"></div>


<main class="blog-principal">


<h1
class="blog-titulo"
data-i18n="blog.titulo">
Blog
</h1>


<p
class="blog-subtitulo"
data-i18n="blog.subtitulo">
Descubra novidades, dicas e experiências em Porto de Galinhas.
</p>


<div
id="lista"
class="blog-grid">
</div>


<p
id="vazio"
class="blog-mensagem"
style="display:none"
data-i18n="blog.vazio">
Ainda não temos artigos publicados.
</p>


<p
id="erro"
class="blog-erro"
style="display:none"
data-i18n="blog.erro">
Não foi possível carregar os artigos agora.
</p>


</main>


<div id="layout-rodape"></div>


<script src="/js/layout.js"></script>

<script src="/js/i18n.js"></script>
<script>

'use strict';


function escapar(valor){

  if(
    valor === undefined ||
    valor === null
  ){

    return '';

  }


  return String(valor)

  .replace(
    /&/g,
    '&amp;'
  )

  .replace(
    /</g,
    '&lt;'
  )

  .replace(
    />/g,
    '&gt;'
  )

  .replace(
    /"/g,
    '&quot;'
  )

  .replace(
    /'/g,
    '&#039;'
  );

}




async function carregarBlog(){


  const lista =
    document.getElementById(
      'lista'
    );


  const vazio =
    document.getElementById(
      'vazio'
    );


  const erro =
    document.getElementById(
      'erro'
    );



  try {



    const resposta =
      await fetch(
        '/api/blog'
      );



    if(
      !resposta.ok
    ){

      throw new Error(
        'Erro ao carregar artigos'
      );

    }



    const artigos =
      await resposta.json();



    console.log(
      '[BLOG] Artigos:',
      artigos
    );



    if(
      !Array.isArray(artigos) ||
      artigos.length === 0
    ){

      vazio.style.display =
        'block';

      return;

    }




    lista.innerHTML =

      artigos
      .map(
        function(artigo){



          const titulo =
            escapar(
              artigo.titulo ||
              'Sem título'
            );



          const resumo =
            escapar(
              artigo.resumo ||
              ''
            );



          const id =
            encodeURIComponent(
              artigo.id
            );



          let imagem =
            '';




          if(
            artigo.capa_url
          ){



            imagem = `

              <img

                class="blog-card-imagem"

                src="${escapar(
                  artigo.capa_url
                )}"

                alt="${titulo}"

                loading="lazy"

              >

            `;



          } else {



            imagem = `

              <div
                class="blog-card-sem-imagem"
              >

                ${titulo}

              </div>

            `;


          }





          return `

            <a

              class="blog-card"

              href="/artigo?id=${id}"

            >



              ${imagem}




              <div

                class="blog-card-conteudo"

              >



                <h2

                  class="blog-card-titulo"

                >

                  ${titulo}

                </h2>





                ${
                  resumo
                  ?

                  `

                  <p

                    class="blog-card-resumo"

                  >

                    ${resumo}

                  </p>


                  `

                  :

                  ''

                }




              </div>



            </a>


          `;



        }

      )

      .join('');





  } catch(
    erroCarregamento
  ){



    console.error(
      '[BLOG] Erro:',
      erroCarregamento
    );



    erro.style.display =
      'block';



  }


}
document.addEventListener(
  'DOMContentLoaded',
  function(){

    carregarBlog();

  }
);


</script>


</body>

</html>
