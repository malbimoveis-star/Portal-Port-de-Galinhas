<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Blog — Portal Porto de Galinhas</title>

  <!-- CSS PRINCIPAL DO SITE -->
  <link
    rel="stylesheet"
    href="../CSS/styles.css"
  >

  <style>
    /* =====================================================
       BLOG
    ===================================================== */

    .blog-principal {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .blog-titulo {
      color: var(--azul-primario, #0a5c8a);
      margin: 0 0 10px;
      font-size: 2.2rem;
    }

    .blog-subtitulo {
      color: #55707f;
      margin: 0 0 30px;
    }

    .blog-grid {
      display: grid;
      grid-template-columns:
        repeat(
          auto-fill,
          minmax(280px, 1fr)
        );

      gap: 24px;
    }

    /* =====================================================
       CARD DO ARTIGO
    ===================================================== */

    .blog-card {
      display: block;

      background: #ffffff;

      border-radius: 12px;

      overflow: hidden;

      text-decoration: none;

      color: inherit;

      box-shadow:
        0 3px 12px
        rgba(0, 0, 0, 0.10);

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
    }

    .blog-card:hover {
      transform:
        translateY(-4px);

      box-shadow:
        0 8px 22px
        rgba(0, 0, 0, 0.15);
    }

    /* =====================================================
       IMAGEM DE CAPA
    ===================================================== */

    .blog-card-imagem {
      width: 100%;

      height: 210px;

      object-fit: cover;

      display: block;

      background: #dde5ea;
    }

    /* =====================================================
       QUANDO NÃO EXISTE IMAGEM
    ===================================================== */

    .blog-card-sem-imagem {
      width: 100%;

      height: 210px;

      display: flex;

      align-items: center;

      justify-content: center;

      text-align: center;

      padding: 25px;

      background:
        linear-gradient(
          135deg,
          #0a5c8a,
          #1385bd
        );

      color: #ffffff;

      font-size: 1.15rem;

      font-weight: bold;
    }

    /* =====================================================
       CONTEÚDO DO CARD
    ===================================================== */

    .blog-card-conteudo {
      padding: 18px;
    }

    .blog-card-titulo {
      margin: 0 0 10px;

      color:
        var(
          --azul-primario,
          #0a5c8a
        );

      font-size: 1.15rem;

      line-height: 1.35;
    }

    .blog-card-resumo {
      margin: 0;

      color: #55707f;

      font-size: 0.95rem;

      line-height: 1.55;
    }

    /* =====================================================
       MENSAGEM VAZIA
    ===================================================== */

    .blog-vazio {
      color: #55707f;

      padding: 30px 0;

      font-size: 1rem;
    }

    /* =====================================================
       ERRO
    ===================================================== */

    .blog-erro {
      color: #b42318;

      padding: 30px 0;
    }

    /* =====================================================
       RESPONSIVO
    ===================================================== */

    @media (max-width: 700px) {

      .blog-principal {
        padding:
          30px 15px 60px;
      }

      .blog-titulo {
        font-size: 1.8rem;
      }

      .blog-grid {
        grid-template-columns: 1fr;
      }

      .blog-card-imagem,
      .blog-card-sem-imagem {
        height: 200px;
      }

    }

  </style>

</head>


<body>


  <!-- =====================================================
       HEADER DO SITE
  ===================================================== -->

  <div id="layout-header"></div>


  <!-- =====================================================
       CONTEÚDO DO BLOG
  ===================================================== -->

  <main class="blog-principal">

    <h1
      class="blog-titulo"
      data-i18n="blog.titulo"
    >
      Blog
    </h1>

    <p
      class="blog-subtitulo"
      data-i18n="blog.subtitulo"
    >
      Descubra novidades, dicas e experiências em Porto de Galinhas.
    </p>


    <!-- LISTA DOS ARTIGOS -->

    <div
      id="lista"
      class="blog-grid"
    ></div>


    <!-- MENSAGEM QUANDO NÃO HÁ ARTIGOS -->

    <p
      id="vazio"
      class="blog-vazio"
      data-i18n="blog.vazio"
      style="display: none;"
    >
      Ainda não temos artigos publicados.
    </p>


    <!-- MENSAGEM DE ERRO -->

    <p
      id="erro"
      class="blog-erro"
      data-i18n="blog.erro"
      style="display: none;"
    >
      Não foi possível carregar os artigos agora.
    </p>

  </main>


  <!-- =====================================================
       RODAPÉ DO SITE
  ===================================================== -->

  <div id="layout-rodape"></div>


  <!-- =====================================================
       JAVASCRIPT
  ===================================================== -->

  <script src="../js/i18n.js"></script>

  <script src="../js/layout.js"></script>


  <script>

    'use strict';


    // =====================================================
    // ESCAPAR HTML
    // =====================================================

    function escapeHtml(valor) {

      if (
        valor === null ||
        valor === undefined
      ) {
        return '';
      }

      return String(valor)

        .replace(
          /&/g,
          '&amp;'
        )

        .replace(
          /</g,
          '&lt;'
        )

        .replace(
          />/g,
          '&gt;'
        )

        .replace(
          /"/g,
          '&quot;'
        )

        .replace(
          /'/g,
          '&#039;'
        );

    }


    // =====================================================
    // TRADUÇÃO
    // =====================================================

    function traduzir(chave, padrao) {

      if (
        window.i18nPortal &&
        typeof window.i18nPortal.t === 'function'
      ) {

        const valor =
          window.i18nPortal.t(chave);

        if (
          valor &&
          valor !== chave
        ) {
          return valor;
        }

      }

      return padrao;

    }


    // =====================================================
    // CARREGAR ARTIGOS
    // =====================================================

    async function carregarBlog() {

      const lista =
        document.getElementById('lista');

      const vazio =
        document.getElementById('vazio');

      const erro =
        document.getElementById('erro');


      try {

        vazio.style.display =
          'none';

        erro.style.display =
          'none';


        const resposta =
          await fetch(
            '/api/blog'
          );


        if (
          !resposta.ok
        ) {

          throw new Error(
            'Erro ao carregar artigos'
          );

        }


        const artigos =
          await resposta.json();


        console.log(
          '[BLOG] Artigos recebidos:',
          artigos
        );


        if (
          !Array.isArray(artigos) ||
          artigos.length === 0
        ) {

          lista.innerHTML =
            '';

          vazio.style.display =
            'block';

          return;

        }


        lista.innerHTML =
          artigos
            .map(
              function (artigo) {

                const id =
                  encodeURIComponent(
                    artigo.id
                  );


                const titulo =
                  escapeHtml(
                    artigo.titulo ||
                    'Sem título'
                  );


                const resumo =
                  escapeHtml(
                    artigo.resumo ||
                    ''
                  );


                /*
                 * A CAPA É A PRIMEIRA IMAGEM
                 * CADASTRADA NO CAMPO capa_url.
                 */

                const capa =
                  artigo.capa_url
                    ? String(
                        artigo.capa_url
                      ).trim()
                    : '';


                let imagemHtml =
                  '';


                if (capa) {

                  imagemHtml = `

                    <img
                      class="blog-card-imagem"
                      src="${escapeHtml(capa)}"
                      alt="${titulo}"
                      loading="lazy"
                      onerror="
                        this.style.display='none';
                        this.nextElementSibling.style.display='flex';
                      "
                    >

                    <div
                      class="blog-card-sem-imagem"
                      style="display:none;"
                    >
                      ${titulo}
                    </div>

                  `;

                } else {

                  imagemHtml = `

                    <div
                      class="blog-card-sem-imagem"
                    >
                      ${titulo}
                    </div>

                  `;

                }


                return `

                  <a
                    class="blog-card"
                    href="/artigo?id=${id}"
                  >

                    ${imagemHtml}

                    <div
                      class="blog-card-conteudo"
                    >

                      <h2
                        class="blog-card-titulo"
                      >
                        ${titulo}
                      </h2>

                      ${
                        resumo
                          ? `
                            <p
                              class="blog-card-resumo"
                            >
                              ${resumo}
                            </p>
                          `
                          : ''
                      }

                    </div>

                  </a>

                `;

              }
            )
            .join('');


      } catch (err) {

        console.error(
          '[BLOG] Erro ao carregar:',
          err
        );


        lista.innerHTML =
          '';

        vazio.style.display =
          'none';

        erro.style.display =
          'block';

      }

    }


    // =====================================================
    // INICIALIZAÇÃO
    // =====================================================

    document.addEventListener(
      'DOMContentLoaded',
      function () {

        /*
         * O layout.js monta o header,
         * o rodapé e inicializa o i18n.
         *
         * O blog espera o evento
         * i18n:aplicado antes de carregar.
         */

        if (
          window.i18nPortal
        ) {

          document.addEventListener(
            'i18n:aplicado',
            function () {

              carregarBlog();

            },
            {
              once: true
            }
          );

        } else {

          carregarBlog();

        }

      }
    );


  </script>


</body>

</html>
