      <!-- ===============================================
           EDITAR ANÚNCIO
      ================================================ -->

      <section
        id="tabEditarAnuncio"
        class="escondido"
      >

        <div class="card">

          <h2>
            Editar anúncio
          </h2>

          <p>
            Edite os dados do anúncio selecionado.
          </p>

          <input
            type="hidden"
            id="editarAnuncioId"
            value=""
          >


          <p
            id="erroEditarAnuncio"
            class="erro"
          ></p>


          <div class="blog-form">


            <!-- TÍTULO -->

            <div class="campo">

              <label for="editarAnuncioTitulo">
                Título do anúncio
              </label>

              <input
                type="text"
                id="editarAnuncioTitulo"
                placeholder="Digite o título do anúncio"
              >

            </div>


            <!-- DESCRIÇÃO -->

            <div class="campo">

              <label for="editarAnuncioDescricao">
                Descrição
              </label>

              <textarea
                id="editarAnuncioDescricao"
                rows="6"
                placeholder="Digite a descrição do anúncio"
              ></textarea>

            </div>


            <!-- TELEFONE -->

            <div class="campo">

              <label for="editarAnuncioTelefone">
                Telefone
              </label>

              <input
                type="text"
                id="editarAnuncioTelefone"
                placeholder="Digite o telefone"
              >

            </div>


            <!-- ENDEREÇO -->

            <div class="campo">

              <label for="editarAnuncioEndereco">
                Endereço
              </label>

              <input
                type="text"
                id="editarAnuncioEndereco"
                placeholder="Digite o endereço"
              >

            </div>


            <!-- LATITUDE -->

            <div class="campo">

              <label for="editarAnuncioLatitude">
                Latitude
              </label>

              <input
                type="text"
                id="editarAnuncioLatitude"
                placeholder="Ex.: -8.5069"
              >

            </div>


            <!-- LONGITUDE -->

            <div class="campo">

              <label for="editarAnuncioLongitude">
                Longitude
              </label>

              <input
                type="text"
                id="editarAnuncioLongitude"
                placeholder="Ex.: -35.0068"
              >

            </div>


            <!-- STATUS -->

            <div class="campo">

              <label for="editarAnuncioStatus">
                Status
              </label>

              <select
                id="editarAnuncioStatus"
              >

                <option value="pendente">
                  Pendente
                </option>

                <option value="ativo">
                  Ativo
                </option>

                <option value="rejeitado">
                  Rejeitado
                </option>

              </select>

            </div>


            <!-- BOTÕES -->

            <div
              style="
                display:flex;
                gap:10px;
                flex-wrap:wrap;
                margin-top:15px;
              "
            >

              <button
                type="button"
                id="btnSalvarEdicaoAnuncio"
                class="btn btn--principal"
              >
                Salvar alterações
              </button>


              <button
                type="button"
                id="btnCancelarEdicaoAnuncio"
                class="btn"
              >
                Cancelar edição
              </button>

            </div>

          </div>

        </div>

      </section>



      <!-- ===============================================
           EDITAR CATEGORIA
      ================================================ -->

      <section
        id="tabEditarCategoria"
        class="escondido"
      >

        <div class="card">

          <h2>
            Editar categoria
          </h2>

          <p>
            Altere os dados da categoria selecionada.
          </p>

          <input
            type="hidden"
            id="editarCategoriaId"
            value=""
          >


          <p
            id="erroEditarCategoria"
            class="erro"
          ></p>


          <div class="form-categoria">


            <!-- NOME -->

            <div class="campo">

              <label for="editarCategoriaNome">
                Nome da categoria
              </label>

              <input
                type="text"
                id="editarCategoriaNome"
                placeholder="Digite o nome da categoria"
              >

            </div>


            <!-- ÍCONE -->

            <div class="campo">

              <label for="editarCategoriaIcone">
                URL do ícone
              </label>

              <input
                type="text"
                id="editarCategoriaIcone"
                placeholder="https://..."
              >

            </div>


            <!-- BOTÕES -->

            <div
              style="
                display:flex;
                gap:10px;
                flex-wrap:wrap;
                margin-top:15px;
              "
            >

              <button
                type="button"
                id="btnSalvarEdicaoCategoria"
                class="btn btn--principal"
              >
                Salvar alterações
              </button>


              <button
                type="button"
                id="btnCancelarEdicaoCategoria"
                class="btn"
              >
                Cancelar edição
              </button>

            </div>

          </div>

        </div>

      </section>
