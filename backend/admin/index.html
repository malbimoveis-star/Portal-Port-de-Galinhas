<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Administrativo - Portal Porto de Galinhas</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
    body { margin: 0; background: #f2f5f8; color: #1c2b36; }
    header { background: #0a5c8a; color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { margin: 0; font-size: 1.3em; }
    header button { background: #ff6600; border: none; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    main { max-width: 1000px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h2 { margin-top: 0; color: #0a5c8a; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #e3e8ec; font-size: 0.92em; }
    th { color: #55707f; font-weight: 600; }
    .btn { border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; color: #fff; font-size: 0.85em; margin-right: 6px; }
    .btn--aprovar { background: #2e9e5b; }
    .btn--rejeitar { background: #d64545; }
    .btn--excluir { background: #999; }
    .btn--salvar { background: #0a5c8a; }
    .badge { padding: 3px 8px; border-radius: 12px; font-size: 0.78em; color: #fff; }
    .badge--pendente { background: #e0a020; }
    .badge--ativo { background: #2e9e5b; }
    .badge--rejeitado { background: #d64545; }
    form.login-form { display: flex; flex-direction: column; gap: 12px; max-width: 320px; margin: 80px auto; }
    form.login-form input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
    form.login-form button { padding: 10px; background: #0a5c8a; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .form-inline { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .form-inline input { padding: 8px; border: 1px solid #ccc; border-radius: 6px; flex: 1; min-width: 140px; }
    .erro { color: #d64545; font-size: 0.9em; }
    .escondido { display: none; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tabs button { padding: 8px 16px; border: 1px solid #0a5c8a; background: #fff; color: #0a5c8a; border-radius: 6px; cursor: pointer; }
    .tabs button.ativa { background: #0a5c8a; color: #fff; }
  </style>
</head>
<body>

  <div id="telaLogin">
    <form class="login-form" id="formLogin">
      <h2 style="text-align:center; color:#0a5c8a;">Painel Administrativo</h2>
      <input type="text" id="usuario" placeholder="Usuario" required />
      <input type="password" id="senha" placeholder="Senha" required />
      <button type="submit">Entrar</button>
      <p class="erro" id="erroLogin"></p>
    </form>
  </div>

  <div id="telaAdmin" class="escondido">
    <header>
      <h1>Painel Administrativo - Portal Porto de Galinhas</h1>
      <button id="btnSair">Sair</button>
    </header>

    <main>
      <div class="tabs">
        <button data-tab="pendentes" class="ativa">Anuncios Pendentes</button>
        <button data-tab="todos">Todos os Anuncios</button>
        <button data-tab="categorias">Categorias</button>
      </div>

      <section id="tabPendentes" class="card">
        <h2>Anuncios Pendentes de Aprovacao</h2>
        <table>
          <thead>
            <tr><th>ID</th><th>Titulo</th><th>Comerciante</th><th>Status</th><th>Acoes</th></tr>
          </thead>
          <tbody id="listaPendentes"></tbody>
        </table>
      </section>

      <section id="tabTodos" class="card escondido">
        <h2>Todos os Anuncios</h2>
        <table>
          <thead>
            <tr><th>ID</th><th>Titulo</th><th>Status</th><th>Lat/Lng</th><th>Acoes</th></tr>
          </thead>
          <tbody id="listaTodos"></tbody>
        </table>
      </section>

      <section id="tabCategorias" class="card escondido">
        <h2>Categorias</h2>
        <div class="form-inline">
          <input type="text" id="novaCategoriaNome" placeholder="Nome da categoria" />
          <input type="text" id="novaCategoriaIcone" placeholder="/assets/icons/exemplo.svg" />
          <button class="btn btn--salvar" id="btnAddCategoria">Adicionar</button>
        </div>
        <table>
          <thead>
            <tr><th>ID</th><th>Nome</th><th>Icone</th><th>Slug</th><th>Acoes</th></tr>
          </thead>
          <tbody id="listaCategorias"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
